<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazel - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: white;
      color: #16a34a;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .golf-ball {
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon golf-ball" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="white"/>
      <circle cx="50" cy="50" r="48" stroke="#e5e5e5" stroke-width="2"/>
      <circle cx="35" cy="35" r="3" fill="#d4d4d4"/>
      <circle cx="50" cy="30" r="3" fill="#d4d4d4"/>
      <circle cx="65" cy="35" r="3" fill="#d4d4d4"/>
      <circle cx="30" cy="50" r="3" fill="#d4d4d4"/>
      <circle cx="45" cy="45" r="3" fill="#d4d4d4"/>
      <circle cx="55" cy="45" r="3" fill="#d4d4d4"/>
      <circle cx="70" cy="50" r="3" fill="#d4d4d4"/>
      <circle cx="35" cy="65" r="3" fill="#d4d4d4"/>
      <circle cx="50" cy="70" r="3" fill="#d4d4d4"/>
      <circle cx="65" cy="65" r="3" fill="#d4d4d4"/>
    </svg>
    
    <h1>You're Offline</h1>
    <p>
      No internet connection detected. 
      Jazel needs to be online to track your golf rounds.
      Please check your connection and try again.
    </p>
    
    <button class="retry-btn" onclick="location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
