<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Golf ball -->
  <circle cx="16" cy="16" r="14" fill="url(#ballGradient)" filter="url(#shadow)" stroke="#ccc" stroke-width="0.5"/>
  <!-- Dimples pattern -->
  <circle cx="10" cy="10" r="2" fill="#e0e0e0"/>
  <circle cx="16" cy="8" r="2" fill="#e0e0e0"/>
  <circle cx="22" cy="10" r="2" fill="#e0e0e0"/>
  <circle cx="8" cy="16" r="2" fill="#e0e0e0"/>
  <circle cx="13" cy="14" r="2" fill="#e0e0e0"/>
  <circle cx="19" cy="14" r="2" fill="#e0e0e0"/>
  <circle cx="24" cy="16" r="2" fill="#e0e0e0"/>
  <circle cx="10" cy="22" r="2" fill="#e0e0e0"/>
  <circle cx="16" cy="20" r="2" fill="#e0e0e0"/>
  <circle cx="22" cy="22" r="2" fill="#e0e0e0"/>
  <circle cx="16" cy="26" r="2" fill="#e0e0e0"/>
</svg>
