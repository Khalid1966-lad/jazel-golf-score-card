<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- Golf ball (blue gradient circle) -->
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a0d2db"/>
      <stop offset="100%" style="stop-color:#1e5f74"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="11" fill="url(#ballGradient)"/>
  <!-- Dimple pattern -->
  <circle cx="11" cy="12" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="16" cy="10" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="21" cy="12" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="10" cy="17" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="14" cy="15" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="18" cy="15" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="22" cy="17" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="12" cy="21" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="16" cy="19" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="20" cy="21" r="1.2" fill="#1e5f74" opacity="0.4"/>
  <circle cx="16" cy="23" r="1.2" fill="#1e5f74" opacity="0.4"/>
